<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉藥選課查課系統(目前版本:2026.4.14)</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* ===== 配色系統 ===== */
        :root {
            --dark: #050810;
            --darker: #020617;
            --ipsec: #00E096;
            --transport: #6366F1;
            --net: #165DFF;
            --text: #E5E7EB;
            --text-light: #9CA3AF;
        }

        body { 
            font-family: 'Consolas', 'Monaco', 'JetBrains Mono', 'Segoe UI', Tahoma, Geneva, sans-serif; 
            background-color: var(--darker);
            background-size: 40px 40px;
            background-image: 
              linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            color: var(--text); 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: var(--dark);
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0, 224, 150, 0.1);
            border: 1px solid rgba(0, 224, 150, 0.2);
        }

        /* ===== 標題區域樣式 ===== */
        .title-section {
            position: relative;
            background: transparent;
            border: 1px solid rgba(0, 224, 150, 0.2);
            border-radius: 12px;
            padding: 40px 30px;
            margin-bottom: 30px;
            overflow: hidden;
            min-height: 200px;
        }

        .title-section canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.8;
        }

        .title-section > * {
            position: relative;
            z-index: 10;
        }

        .title-content {
            position: relative;
            z-index: 5;
        }

        h1 { 
            text-align: center; 
            color: var(--ipsec);
            text-shadow: 0 0 20px rgba(0, 224, 150, 0.5);
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }

        .title-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 12px;
        }

        .title-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .title-link a {
            color: var(--ipsec) !important;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .title-link a:hover {
            text-shadow: 0 0 10px rgba(0, 224, 150, 0.8);
        }
        
        .search-container { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .search-input { 
            width: 80%; 
            max-width: 600px; 
            padding: 12px 20px; 
            font-size: 16px; 
            border: 2px solid var(--text-light);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-radius: 25px; 
            outline: none; 
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .search-input:focus { 
            border-color: var(--ipsec); 
            box-shadow: 0 0 20px rgba(0, 224, 150, 0.5);
            background-color: rgba(0, 224, 150, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .filter-section { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-bottom: 20px; 
            padding: 20px; 
            background: transparent;
            border: 1px solid rgba(0, 224, 150, 0.2);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            min-height: 250px;
        }

        .filter-section canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.8;
        }

        .filter-section > * {
            position: relative;
            z-index: 5;
        }

        .filter-group { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 180px; 
        }

        .filter-group label.group-title { 
            font-size: 14px; 
            margin-bottom: 12px; 
            font-weight: bold; 
            color: var(--ipsec);
            border-bottom: 2px solid var(--ipsec);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filter-group label.Warning { 
            font-size: 14px; 
            margin-bottom: 5px; 
            color: #ff6b6b;
            padding-bottom: 0px; 
        }
        
        /* ===== 自訂勾選框樣式 ===== */
        .checkbox-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 224, 150, 0.2);
            padding: 15px; 
            border-radius: 8px; 
            max-height: 140px; 
            overflow-y: auto;
            position: relative;
            z-index: 15;
        }

        .checkbox-container label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 15;
            padding: 8px 14px;
            background-color: transparent;
            border: 2px solid var(--text-light);
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: normal;
            color: var(--text);
            white-space: nowrap;
        }

        /* 隱藏原生勾選框 */
        .checkbox-container input[type="checkbox"] {
            display: none;
        }

        /* 懸停未選中狀態 - 藍色 */
        .checkbox-container label:hover {
            border-color: var(--net);
            color: var(--net);
            box-shadow: 0 0 12px rgba(22, 93, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 選中後的樣式 - 持續綠色 */
        .checkbox-container input[type="checkbox"]:checked + label {
            border-color: var(--ipsec) !important;
            background-color: var(--ipsec) !important;
            color: var(--darker) !important;
            box-shadow: 0 0 20px rgba(0, 224, 150, 0.8), inset 0 0 10px rgba(0, 224, 150, 0.3) !important;
            font-weight: bold;
            position: relative;
            z-index: 15;
        }

        /* 已選中狀態下的懸停：變成灰色 */
        .checkbox-container input[type="checkbox"]:checked + label:hover {
            border-color: var(--text-light);
            background-color: var(--text-light);
            color: var(--darker);
            box-shadow: 0 0 12px rgba(229, 231, 235, 0.4);
        }

        .hours-input { 
            padding: 10px; 
            border: 2px solid var(--text-light);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-radius: 8px; 
            font-size: 14px; 
            width: 100px;
            transition: all 0.3s ease;
        }

        .hours-input:focus {
            border-color: var(--ipsec);
            box-shadow: 0 0 15px rgba(0, 224, 150, 0.4);
            background-color: rgba(0, 224, 150, 0.1);
            outline: none;
        }

        .btn-search { 
            padding: 12px 20px; 
            background: linear-gradient(135deg, var(--ipsec), #00c88f);
            color: var(--darker); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 10px; 
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px rgba(0, 224, 150, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-search:hover { 
            background: linear-gradient(135deg, #00f0a0, var(--ipsec));
            box-shadow: 0 0 25px rgba(0, 224, 150, 0.6);
            transform: translateY(-2px);
        }

        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(0, 224, 150, 0.1);
            min-height: 400px;
            border: 1px solid rgba(0, 224, 150, 0.2);
            position: relative;
            background: transparent;
        }

        .table-responsive canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.8;
            border-radius: 8px;
        }

        .table-responsive table {
            position: relative;
            z-index: 5;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px; 
            background: transparent;
        }

        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid rgba(0, 224, 150, 0.1);
            white-space: normal; 
        }

        th { 
            background: linear-gradient(135deg, rgba(0, 224, 150, 0.2), rgba(99, 102, 241, 0.2));
            color: var(--ipsec); 
            position: sticky; 
            top: 0; 
            z-index: 10;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover { 
            background-color: rgba(0, 224, 150, 0.08);
            transition: all 0.3s ease;
        }
        
        .pagination-info { 
            margin-top: 10px; 
            margin-bottom: 10px; 
            font-size: 14px; 
            color: var(--text-light); 
            text-align: right; 
            font-weight: bold; 
        }

        .pagination-controls { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
        }

        .page-btn { 
            padding: 10px 16px; 
            border: 2px solid var(--ipsec);
            background: transparent;
            color: var(--ipsec); 
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }

        .page-btn:hover { 
            background-color: var(--ipsec);
            color: var(--darker);
            box-shadow: 0 0 20px rgba(0, 224, 150, 0.4);
            transform: scale(1.05);
        }

        .page-btn.active { 
            background-color: var(--ipsec);
            color: var(--darker);
            box-shadow: 0 0 20px rgba(0, 224, 150, 0.6);
        }

        .page-btn:disabled { 
            border-color: var(--text-light);
            color: var(--text-light);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* ===== 滑鼠懸停動畫 ===== */
        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(0, 224, 150, 0.4);
            }
            50% { 
                box-shadow: 0 0 20px rgba(0, 224, 150, 0.8);
            }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container { 
            animation: slide-in 1s ease-out;
        }
        
        /* ===== 手機版 RWD ===== */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 10px; }
            .search-input { width: 100%; box-sizing: border-box; }
            .filter-section { flex-direction: column; gap: 15px; }
            .filter-group { width: 100%; }

            table thead { display: none; }
            
            table, tbody { display: block; width: 100%; }
            tr {
                display: flex;
                flex-direction: column;
                margin-bottom: 20px;
                background-color: rgba(0, 224, 150, 0.08);
                border: 1px solid rgba(0, 224, 150, 0.3);
                border-radius: 12px;
                box-shadow: 0 4px 12px rgba(0, 224, 150, 0.1);
                position: relative; 
                overflow: hidden; 
            }

            td {
                width: 100%;
                box-sizing: border-box;
                text-align: right !important; 
                padding: 12px 15px;
                position: relative;
                border-bottom: 1px solid rgba(0, 224, 150, 0.1);
                font-size: 15px;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                min-height: 45px;
                color: var(--text);
            }
            td:last-child { border-bottom: none; }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                font-weight: bold;
                color: var(--text-light);
                text-align: left;
            }

            td[data-label="科目名稱"] {
                order: -1;
                background: linear-gradient(135deg, rgba(0, 224, 150, 0.3), rgba(99, 102, 241, 0.2));
                color: var(--ipsec) !important; 
                font-size: 18px;
                text-align: left !important;
                justify-content: flex-start;
                padding: 15px;
                padding-right: 60px;
                border-bottom: none;
                z-index: 1;
                text-shadow: 0 0 10px rgba(0, 224, 150, 0.4);
            }
            td[data-label="科目名稱"]::before { display: none; }

            td[data-label="大綱"] {
                position: absolute;
                top: 0;
                right: 0;
                background: transparent;
                border: none;
                padding: 0;
                width: 60px; 
                height: 54px; 
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10; 
            }
            td[data-label="大綱"]::before { display: none; }
            
            td[data-label="大綱"] a {
                font-size: 26px !important; 
                filter: drop-shadow(0 2px 4px rgba(0, 224, 150, 0.4)); 
                text-decoration: none;
                display: flex;
                width: 100%;
                height: 100%;
                justify-content: center;
                align-items: center;
                transition: all 0.3s ease;
            }

            td[data-label="大綱"] a:hover {
                filter: drop-shadow(0 4px 8px rgba(0, 224, 150, 0.8));
                transform: scale(1.2);
            }

            td[data-label="編號"] { display: none; }
            td:empty { display: none; }
        }
    </style>
    <script>
        // 背景網格動畫
        window.addEventListener('load', () => {
            const body = document.body;
            let gridOffset = 0;
            function animateGrid() {
                gridOffset = (gridOffset + 0.2) % 40;
                body.style.backgroundPosition = `${gridOffset}px ${gridOffset}px`;
                requestAnimationFrame(animateGrid);
            }
            animateGrid();

            // 粒子網絡背景效果 - 應用到多個區域
            setTimeout(() => {
                createParticleNetworkBackground('.title-section', 35);
                createParticleNetworkBackground('.filter-section', 50);
                createParticleNetworkBackground('.table-responsive', 40, true);
            }, 100);
        });

        function createParticleNetworkBackground(selector, particleCount = 50, isTable = false) {
            const section = document.querySelector(selector);
            if (!section) return;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const nodes = [];
            const connections = [];

            // 初始化 canvas
            function initCanvas() {
                canvas.width = section.offsetWidth;
                canvas.height = section.offsetHeight;
                canvas.style.position = 'absolute';
                canvas.style.top = '0';
                canvas.style.left = '0';
                canvas.style.zIndex = '0';
                if (isTable) {
                    canvas.style.borderRadius = '8px';
                }
                section.insertBefore(canvas, section.firstChild);
            }

            // 創建粒子節點
            class Node {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.color = `rgba(0, 224, 150, ${Math.random() * 0.6 + 0.3})`;
                    this.pulse = Math.random() * Math.PI * 2;
                }

                update() {
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += 0.02;
                }

                draw() {
                    const pulseSize = this.size * (1 + Math.sin(this.pulse) * 0.4);
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, pulseSize, 0, Math.PI * 2);
                    ctx.fill();

                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, pulseSize * 4
                    );
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(1, 'rgba(0, 224, 150, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, pulseSize * 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 創建連接
            function createConnections() {
                connections.length = 0;
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const dx = nodes[i].x - nodes[j].x;
                        const dy = nodes[i].y - nodes[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 140) {
                            const opacity = 1 - (distance / 140) * 0.7;
                            const color = `rgba(0, 224, 150, ${opacity * 0.7})`;
                            connections.push({
                                node1: nodes[i],
                                node2: nodes[j],
                                color: color,
                                opacity: opacity,
                                thickness: 0.3 + (1 - distance / 140) * 0.7
                            });
                        }
                    }
                }
            }

            // 繪製連接
            function drawConnections() {
                connections.forEach(conn => {
                    ctx.strokeStyle = conn.color;
                    ctx.lineWidth = conn.thickness;
                    ctx.beginPath();
                    ctx.moveTo(conn.node1.x, conn.node1.y);
                    ctx.lineTo(conn.node2.x, conn.node2.y);
                    ctx.stroke();
                });
            }

            // 初始化
            function init() {
                initCanvas();
                for (let i = 0; i < particleCount; i++) {
                    nodes.push(new Node());
                }
                createConnections();
                animate();
            }

            // 動畫迴圈
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                nodes.forEach(node => {
                    node.update();
                    node.draw();
                });

                if (Math.floor(Date.now() / 16) % 15 === 0) {
                    createConnections();
                }
                drawConnections();

                requestAnimationFrame(animate);
            }

            // 視窗大小變化時重置
            window.addEventListener('resize', () => {
                canvas.width = section.offsetWidth;
                canvas.height = section.offsetHeight;
                createConnections();
            });

            init();
        }
    </script>
</head>
<body>

<div class="container">
    <div class="title-section" id="titleSection">
        <div class="title-content">
            <h1>🎓 嘉藥選課查課系統</h1>
            <p class="title-subtitle">內容可能有誤 僅供參考 | 版本: 2026.4.14</p>
            <div class="title-link">
                <a href="https://github.com/amdbs-0928/CNU_Course_Scraper.git" target="_blank">
                    <i class="fa fa-github"></i> GitHub 專案連結 (查看版本更新事項)
                </a>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 輸入課程名稱搜尋 (中英文皆可)...">
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label class="group-title">科系</label>
            <div class="checkbox-container" id="dept-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">年級</label>
            <div class="checkbox-container" id="grade-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">班級</label>
            <!-- <label class="Warning">選了多班開課課程不顯示</label> -->
            <div class="checkbox-container" id="class-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">課程種類</label>
            <div class="checkbox-container" id="type-cb">載入中...</div>
        </div>
        
        <div class="filter-group" style="min-width: 250px;">
            <label class="group-title">星期幾</label>
            <div class="checkbox-container" id="day-cb">
                <label><input type="checkbox" value="1"> 星期一</label>
                <label><input type="checkbox" value="2"> 星期二</label>
                <label><input type="checkbox" value="3"> 星期三</label>
                <label><input type="checkbox" value="4"> 星期四</label>
                <label><input type="checkbox" value="5"> 星期五</label>
                <label><input type="checkbox" value="6"> 星期六</label>
                <label><input type="checkbox" value="7"> 星期日</label>
            </div>
        </div>
        <div class="filter-group">
            <label class="group-title">第幾節課</label>
            <div class="checkbox-container" id="period-cb">載入中...</div>
        </div>

        <div class="filter-group" style="flex: 0 0 auto;">
            <label class="group-title">總時數</label>
            <input type="number" id="hours" class="hours-input" placeholder="例如: 2">
            <button class="btn-search" onclick="applyFilters()">🔍 篩選課程</button>
        </div>
    </div>

    <div class="pagination-info" id="pageInfo">正在初始化資料庫...</div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>編號</th>
                    <th>大綱</th>
                    <th>科系</th>
                    <th>科目名稱</th>
                    <th>種類/選課別</th>
                    <th>學分/時數</th>
                    <th>上課時間</th>
                    <th>開課班級</th>
                    <th>教室</th>
                    <th>授課老師</th>
                </tr>
            </thead>
            <tbody id="courseBody"></tbody>
        </table>
    </div>

    <div class="pagination-controls" id="paginationControls"></div>
</div>

<script>
    let allCourses = [];       
    let filteredResults = [];  
    let currentPage = 1;       
    const itemsPerPage = 25;   

    window.onload = async function() {
        try {
            const response = await fetch('courses_updated.json'); 
            allCourses = await response.json();
            
            extractAndRenderCheckboxes();
            
            filteredResults = allCourses;
            renderTable();
        } catch (error) {
            console.error("載入失敗:", error);
            document.getElementById('courseBody').innerHTML = "<tr><td colspan='10' style='color:red; text-align:center;'>無法載入資料，請確認 courses_updated.json 是否存在。</td></tr>";
        }
    };

    function extractAndRenderCheckboxes() {
        const depts = [...new Set(allCourses.map(c => c.department))].filter(Boolean).sort();
        const grades = [...new Set(allCourses.map(c => c.grade))].filter(Boolean).sort();
        const classes = [...new Set(allCourses.map(c => c.class))].filter(Boolean).sort();
        const types = [...new Set(allCourses.map(c => `${c.required_or_elective} ${c.course_category}`.trim()))].filter(Boolean).sort();
        
        let allPeriods = new Set();
        allCourses.forEach(c => {
            if(c.schedule) {
                c.schedule.forEach(s => {
                    if(s.period) s.period.split('-').forEach(p => allPeriods.add(p.trim()));
                });
            }
        });
        const periods = [...allPeriods].sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));

        generateCheckboxHTML('dept-cb', depts);
        generateCheckboxHTML('grade-cb', grades, "年級 ");
        generateCheckboxHTML('class-cb', classes, "班 ");
        generateCheckboxHTML('type-cb', types);
        generateCheckboxHTML('period-cb', periods, "第 ", " 節");
    }

    function generateCheckboxHTML(containerId, dataArray, prefix = "", suffix = "") {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        dataArray.forEach((val, index) => {
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = val;
            input.id = `checkbox-${containerId}-${index}`;
            
            const label = document.createElement('label');
            label.htmlFor = input.id;
            label.textContent = `${prefix}${val}${suffix}`;
            
            container.appendChild(input);
            container.appendChild(label);
        });
    }

    function getCheckedValues(containerId) {
        const checkboxes = document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`);
        return Array.from(checkboxes).map(cb => cb.value);
    }

    function renderTable() {
        const tbody = document.getElementById('courseBody');
        tbody.innerHTML = ""; 

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageData = filteredResults.slice(startIndex, endIndex);

        if(filteredResults.length === 0) {
            tbody.innerHTML = "<tr><td colspan='10' style='text-align:center;'>找不到符合條件的課程</td></tr>";
            document.getElementById('pageInfo').innerText = "共找到 0 筆";
            document.getElementById('paginationControls').innerHTML = "";
            return;
        }

        pageData.forEach((course, index) => {
            let scheduleText = "未定";
            if (course.schedule && course.schedule.length > 0) {
                scheduleText = course.schedule.map(s => `週${s.day}(${s.period})`).join(", ");
            }

            const fullType = `${course.required_or_elective || ''} ${course.course_category || ''}`.trim();

            // 🌟 修正重點：把大綱按鈕改回 target="_blank"，直接開新分頁，繞過學校的 iframe 防護
            const syllabusHtml = course.syllabus_url 
                ? `<a href="${course.syllabus_url}" target="_blank" title="點擊在新分頁查看大綱" style="text-decoration: none; font-size: 18px;">📄</a>` 
                : `<span style="color:#ccc; font-size: 14px;">無</span>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-label="編號">${startIndex + index + 1}</td>
                <td data-label="大綱">${syllabusHtml}</td>
                <td data-label="科系" style="color: var(--net); font-weight:bold;">${course.department || ''}</td>
                <td data-label="科目名稱" style="font-weight: bold; color: var(--ipsec);">${course.subject_name || ''}</td>
                <td data-label="種類/選課別"><small>${fullType}</small></td>
                <td data-label="學分/時數" style="color: var(--transport);">${course.credits || 0}/${course.hours || 0}</td>
                <td data-label="上課時間" style="color: var(--text-light); font-weight: bold;">${scheduleText}</td>
                <td data-label="開課班級" style="color: var(--text-light);">${course.target_classes || ''}</td>
                <td data-label="教室">${course.classroom || ''}</td>
                <td data-label="授課老師" style="font-weight: bold; color: var(--ipsec);">${course.teacher || ''}</td>
            `;
            tr.style.animation = `slide-in 0.5s ease-out ${index * 0.05}s both`;
            tbody.appendChild(tr);
        });

        const totalItems = filteredResults.length;
        const showingTo = Math.min(endIndex, totalItems);
        document.getElementById('pageInfo').innerText = `共 ${totalItems} 筆，顯示第 ${startIndex + 1} 到 ${showingTo} 筆`;

        renderPaginationButtons();
    }

    function renderPaginationButtons() {
        const container = document.getElementById('paginationControls');
        container.innerHTML = "";

        const totalPages = Math.ceil(filteredResults.length / itemsPerPage);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerText = "« 上一頁";
        prevBtn.className = "page-btn";
        prevBtn.disabled = (currentPage === 1);
        prevBtn.onclick = () => { currentPage--; renderTable(); window.scrollTo(0,0); };
        container.appendChild(prevBtn);

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.innerText = i;
            pageBtn.className = i === currentPage ? "page-btn active" : "page-btn";
            pageBtn.onclick = () => { currentPage = i; renderTable(); window.scrollTo(0,0); };
            container.appendChild(pageBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.innerText = "下一頁 »";
        nextBtn.className = "page-btn";
        nextBtn.disabled = (currentPage === totalPages);
        nextBtn.onclick = () => { currentPage++; renderTable(); window.scrollTo(0,0); };
        container.appendChild(nextBtn);
    }

    function applyFilters() {
        currentPage = 1;
        const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
        
        const checkedDepts = getCheckedValues('dept-cb');
        const checkedGrades = getCheckedValues('grade-cb');
        const checkedClasses = getCheckedValues('class-cb');
        const checkedTypes = getCheckedValues('type-cb');
        const checkedDays = getCheckedValues('day-cb');
        const checkedPeriods = getCheckedValues('period-cb');
        const hoursInput = document.getElementById('hours').value.trim();

        filteredResults = allCourses.filter(course => {
            // 關鍵字過濾
            if (searchKeyword && !(course.subject_name || "").toLowerCase().includes(searchKeyword)) return false;
            
            // 🟢 優化：科系過濾 (支援去 target_classes 裡尋找)
            if (checkedDepts.length > 0) {
                const matchDept = checkedDepts.includes(course.department) || 
                                  checkedDepts.some(d => course.target_classes && course.target_classes.includes(d));
                if (!matchDept) return false;
            }

            // 🟢 優化：年級過濾 (把勾選的數字 1,2 轉成 一,二，再去 target_classes 裡尋找)
            if (checkedGrades.length > 0) {
                const gradeMap = {"1":"一", "2":"二", "3":"三", "4":"四", "5":"五", "6":"六", "7":"七", "8":"八"};
                const matchGrade = checkedGrades.includes(course.grade) || 
                                   checkedGrades.some(g => course.target_classes && course.target_classes.includes(gradeMap[g] || g));
                if (!matchGrade) return false;
            }

           // 🟢 優化：班級過濾 (極致的 UX 體驗)
            // 如果使用者勾了「丙」班，系統不僅會秀出「丙」班的課，還會自動秀出該年級「不分班」的共同課！
            if (checkedClasses.length > 0 && !checkedClasses.includes(course.class) && course.class !== "不分班") {
                return false;
            }
            
            // 課程種類過濾
            const fullType = `${course.required_or_elective || ''} ${course.course_category || ''}`.trim();
            if (checkedTypes.length > 0 && !checkedTypes.includes(fullType)) return false;
            
            // 時數過濾
            if (hoursInput && String(course.hours) !== hoursInput) return false;

            // 時間 (星期與節次) 過濾
            if (checkedDays.length > 0 || checkedPeriods.length > 0) {
                if (!course.schedule || course.schedule.length === 0) return false;

                const matchTime = course.schedule.some(s => {
                    const matchDay = checkedDays.length === 0 || checkedDays.includes(String(s.day));
                    let matchPeriod = true;
                    if (checkedPeriods.length > 0) {
                        const coursePeriods = (s.period || "").split('-').map(p => p.trim());
                        matchPeriod = checkedPeriods.some(cp => coursePeriods.includes(cp));
                    }
                    return matchDay && matchPeriod;
                });
                if (!matchTime) return false;
            }
            return true;
        });

        renderTable();
    }
</script>
