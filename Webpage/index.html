<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉藥選課查課系統(目前版本:2026.3.9)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        .search-container { text-align: center; margin-bottom: 25px; }
        .search-input { width: 80%; max-width: 600px; padding: 12px 20px; font-size: 16px; border: 2px solid #3498db; border-radius: 25px; outline: none; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-input:focus { border-color: #2980b9; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2); }

        .filter-section { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; padding: 15px; background: #eef2f3; border-radius: 8px; }
        .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
        .filter-group label.group-title { font-size: 14px; margin-bottom: 8px; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 4px; }
        
        .filter-group label.Warning { font-size: 14px; margin-bottom: 5px; color: #ff0000;  padding-bottom: 0px; }
        
        .checkbox-container { display: flex; flex-wrap: wrap; gap: 8px; background: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 4px; max-height: 120px; overflow-y: auto; }
        .checkbox-container label { font-size: 13px; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 4px; color: #444; }
        .hours-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100px; }
        .btn-search { padding: 12px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s;}
        .btn-search:hover { background-color: #2980b9; }

        .table-responsive { width: 100%; overflow-x: auto; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.05); min-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; white-space: normal; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 10;}
        tr:hover { background-color: #f1f5f8; }
        
        .pagination-info { margin-top: 10px; margin-bottom: 10px; font-size: 14px; color: #666; text-align: right; font-weight: bold; }
        .pagination-controls { display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 20px; flex-wrap: wrap; }
        .page-btn { padding: 8px 14px; border: 1px solid #3498db; background: white; color: #3498db; cursor: pointer; border-radius: 4px; transition: 0.2s; font-weight: bold; }
        .page-btn:hover, .page-btn.active { background-color: #3498db; color: white; }
        .page-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

        /* =========================================
           📱 手機版 RWD (卡片化視圖優化版)
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 10px; }
            .search-input { width: 100%; box-sizing: border-box; }
            .filter-section { flex-direction: column; gap: 15px; }
            .filter-group { width: 100%; }

            table thead { display: none; }
            
            /* 🌟 修正重點：把 tr 變成 flex 容器，方便我們重新排序卡片內的欄位 */
            table, tbody { display: block; width: 100%; }
            tr {
                display: flex;
                flex-direction: column; /* 讓 td 上下排列 */
                margin-bottom: 20px;
                background-color: #fff;
                border: 1px solid #e0e0e0;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                position: relative; 
                overflow: hidden; 
            }

            td {
                width: 100%;
                box-sizing: border-box;
                text-align: right !important; 
                padding: 12px 15px;
                position: relative;
                border-bottom: 1px solid #f1f5f8;
                font-size: 15px;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                min-height: 45px;
            }
            td:last-child { border-bottom: none; }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                font-weight: bold;
                color: #7f8c8d;
                text-align: left;
            }

            /* 🌟 修正重點：強制科目名稱排在卡片的第一列 (最上面) */
            td[data-label="科目名稱"] {
                order: -1; /* flexbox 神奇屬性：數字越小越前面 */
                background-color: #3498db;
                color: #fff !important; 
                font-size: 18px;
                text-align: left !important;
                justify-content: flex-start;
                padding: 15px;
                padding-right: 60px; /* 留出空間給大綱按鈕 */
                border-bottom: none;
                z-index: 1; 
            }
            td[data-label="科目名稱"]::before { display: none; }

            /* 大綱按鈕精準定位在藍色標題列 */
            td[data-label="大綱"] {
                position: absolute;
                top: 0;
                right: 0;
                background: transparent;
                border: none;
                padding: 0;
                width: 60px; 
                height: 54px; 
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10; 
            }
            td[data-label="大綱"]::before { display: none; }
            
            td[data-label="大綱"] a {
                font-size: 26px !important; 
                filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); 
                text-decoration: none;
                display: flex;
                width: 100%;
                height: 100%;
                justify-content: center;
                align-items: center;
            }

            td[data-label="編號"] { display: none; }
            td:empty { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 嘉藥選課查課系統</h1>
    <a href="https://github.com/amdbs-0928/CNU_Course_Scraper.git" target="_blank" style="display: block; text-align: center; margin-bottom: 20px; color: #3498db; font-weight: bold;">🔗 GitHub 專案連結(查看版本更新事項)</a>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 輸入課程名稱搜尋 (中英文皆可)..." oninput="applyFilters()">
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label class="group-title">科系</label>
            <div class="checkbox-container" id="dept-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">年級</label>
            <div class="checkbox-container" id="grade-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">班級</label>
            <label class="Warning">選了多班開課課程不顯示</label>
            <div class="checkbox-container" id="class-cb">載入中...</div>
        </div>
        <div class="filter-group">
            <label class="group-title">課程種類</label>
            <div class="checkbox-container" id="type-cb">載入中...</div>
        </div>
        
        <div class="filter-group" style="min-width: 250px;">
            <label class="group-title">星期幾</label>
            <div class="checkbox-container" id="day-cb">
                <label><input type="checkbox" value="1"> 星期一</label>
                <label><input type="checkbox" value="2"> 星期二</label>
                <label><input type="checkbox" value="3"> 星期三</label>
                <label><input type="checkbox" value="4"> 星期四</label>
                <label><input type="checkbox" value="5"> 星期五</label>
                <label><input type="checkbox" value="6"> 星期六</label>
                <label><input type="checkbox" value="7"> 星期日</label>
            </div>
        </div>
        <div class="filter-group">
            <label class="group-title">第幾節課</label>
            <div class="checkbox-container" id="period-cb">載入中...</div>
        </div>

        <div class="filter-group" style="flex: 0 0 auto;">
            <label class="group-title">總時數</label>
            <input type="number" id="hours" class="hours-input" placeholder="例如: 2">
            <button class="btn-search" onclick="applyFilters()">🔍 篩選課程</button>
        </div>
    </div>

    <div class="pagination-info" id="pageInfo">正在初始化資料庫...</div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>編號</th>
                    <th>大綱</th>
                    <th>科系</th>
                    <th>科目名稱</th>
                    <th>種類/選課別</th>
                    <th>學分/時數</th>
                    <th>上課時間</th>
                    <th>開課班級</th>
                    <th>教室</th>
                    <th>授課老師</th>
                </tr>
            </thead>
            <tbody id="courseBody"></tbody>
        </table>
    </div>

    <div class="pagination-controls" id="paginationControls"></div>
</div>

<script>
    let allCourses = [];       
    let filteredResults = [];  
    let currentPage = 1;       
    const itemsPerPage = 25;   

    window.onload = async function() {
        try {
            const response = await fetch('courses_updated.json'); 
            allCourses = await response.json();
            
            extractAndRenderCheckboxes();
            
            filteredResults = allCourses;
            renderTable();
        } catch (error) {
            console.error("載入失敗:", error);
            document.getElementById('courseBody').innerHTML = "<tr><td colspan='10' style='color:red; text-align:center;'>無法載入資料，請確認 courses_updated.json 是否存在。</td></tr>";
        }
    };

    function extractAndRenderCheckboxes() {
        const depts = [...new Set(allCourses.map(c => c.department))].filter(Boolean).sort();
        const grades = [...new Set(allCourses.map(c => c.grade))].filter(Boolean).sort();
        const classes = [...new Set(allCourses.map(c => c.class))].filter(Boolean).sort();
        const types = [...new Set(allCourses.map(c => `${c.required_or_elective} ${c.course_category}`.trim()))].filter(Boolean).sort();
        
        let allPeriods = new Set();
        allCourses.forEach(c => {
            if(c.schedule) {
                c.schedule.forEach(s => {
                    if(s.period) s.period.split('-').forEach(p => allPeriods.add(p.trim()));
                });
            }
        });
        const periods = [...allPeriods].sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));

        generateCheckboxHTML('dept-cb', depts);
        generateCheckboxHTML('grade-cb', grades, "年級 ");
        generateCheckboxHTML('class-cb', classes, "班 ");
        generateCheckboxHTML('type-cb', types);
        generateCheckboxHTML('period-cb', periods, "第 ", " 節");
    }

    function generateCheckboxHTML(containerId, dataArray, prefix = "", suffix = "") {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        dataArray.forEach(val => {
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" value="${val}"> ${prefix}${val}${suffix}`;
            container.appendChild(label);
        });
    }

    function getCheckedValues(containerId) {
        const checkboxes = document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`);
        return Array.from(checkboxes).map(cb => cb.value);
    }

    function renderTable() {
        const tbody = document.getElementById('courseBody');
        tbody.innerHTML = ""; 

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageData = filteredResults.slice(startIndex, endIndex);

        if(filteredResults.length === 0) {
            tbody.innerHTML = "<tr><td colspan='10' style='text-align:center;'>找不到符合條件的課程</td></tr>";
            document.getElementById('pageInfo').innerText = "共找到 0 筆";
            document.getElementById('paginationControls').innerHTML = "";
            return;
        }

        pageData.forEach((course, index) => {
            let scheduleText = "未定";
            if (course.schedule && course.schedule.length > 0) {
                scheduleText = course.schedule.map(s => `週${s.day}(${s.period})`).join(", ");
            }

            const fullType = `${course.required_or_elective || ''} ${course.course_category || ''}`.trim();

            // 🌟 修正重點：把大綱按鈕改回 target="_blank"，直接開新分頁，繞過學校的 iframe 防護
            const syllabusHtml = course.syllabus_url 
                ? `<a href="${course.syllabus_url}" target="_blank" title="點擊在新分頁查看大綱" style="text-decoration: none; font-size: 18px;">📄</a>` 
                : `<span style="color:#ccc; font-size: 14px;">無</span>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-label="編號">${startIndex + index + 1}</td>
                <td data-label="大綱">${syllabusHtml}</td>
                <td data-label="科系" style="color: #2980b9; font-weight:bold;">${course.department || ''}</td>
                <td data-label="科目名稱" style="font-weight: bold;">${course.subject_name || ''}</td>
                <td data-label="種類/選課別"><small>${fullType}</small></td>
                <td data-label="學分/時數">${course.credits || 0}/${course.hours || 0}</td>
                <td data-label="上課時間" style="color: #d35400; font-weight: bold;">${scheduleText}</td>
                <td data-label="開課班級" style="color: #7f8c8d;">${course.target_classes || ''}</td>
                <td data-label="教室">${course.classroom || ''}</td>
                <td data-label="授課老師" style="font-weight: bold;">${course.teacher || ''}</td>
            `;
            tbody.appendChild(tr);
        });

        const totalItems = filteredResults.length;
        const showingTo = Math.min(endIndex, totalItems);
        document.getElementById('pageInfo').innerText = `共 ${totalItems} 筆，顯示第 ${startIndex + 1} 到 ${showingTo} 筆`;

        renderPaginationButtons();
    }

    function renderPaginationButtons() {
        const container = document.getElementById('paginationControls');
        container.innerHTML = "";

        const totalPages = Math.ceil(filteredResults.length / itemsPerPage);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerText = "« 上一頁";
        prevBtn.className = "page-btn";
        prevBtn.disabled = (currentPage === 1);
        prevBtn.onclick = () => { currentPage--; renderTable(); window.scrollTo(0,0); };
        container.appendChild(prevBtn);

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.innerText = i;
            pageBtn.className = i === currentPage ? "page-btn active" : "page-btn";
            pageBtn.onclick = () => { currentPage = i; renderTable(); window.scrollTo(0,0); };
            container.appendChild(pageBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.innerText = "下一頁 »";
        nextBtn.className = "page-btn";
        nextBtn.disabled = (currentPage === totalPages);
        nextBtn.onclick = () => { currentPage++; renderTable(); window.scrollTo(0,0); };
        container.appendChild(nextBtn);
    }

    function applyFilters() {
        currentPage = 1;
        const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
        
        const checkedDepts = getCheckedValues('dept-cb');
        const checkedGrades = getCheckedValues('grade-cb');
        const checkedClasses = getCheckedValues('class-cb');
        const checkedTypes = getCheckedValues('type-cb');
        const checkedDays = getCheckedValues('day-cb');
        const checkedPeriods = getCheckedValues('period-cb');
        const hoursInput = document.getElementById('hours').value.trim();

        filteredResults = allCourses.filter(course => {
            if (searchKeyword && !(course.subject_name || "").toLowerCase().includes(searchKeyword)) return false;
            if (checkedDepts.length > 0 && !checkedDepts.includes(course.department)) return false;
            if (checkedGrades.length > 0 && !checkedGrades.includes(course.grade)) return false;
            if (checkedClasses.length > 0 && !checkedClasses.includes(course.class)) return false;
            
            const fullType = `${course.required_or_elective || ''} ${course.course_category || ''}`.trim();
            if (checkedTypes.length > 0 && !checkedTypes.includes(fullType)) return false;
            
            if (hoursInput && String(course.hours) !== hoursInput) return false;

            if (checkedDays.length > 0 || checkedPeriods.length > 0) {
                if (!course.schedule || course.schedule.length === 0) return false;

                const matchTime = course.schedule.some(s => {
                    const matchDay = checkedDays.length === 0 || checkedDays.includes(String(s.day));
                    let matchPeriod = true;
                    if (checkedPeriods.length > 0) {
                        const coursePeriods = (s.period || "").split('-').map(p => p.trim());
                        matchPeriod = checkedPeriods.some(cp => coursePeriods.includes(cp));
                    }
                    return matchDay && matchPeriod;
                });
                if (!matchTime) return false;
            }
            return true;
        });

        renderTable();
    }
</script>

</body>
</html>
